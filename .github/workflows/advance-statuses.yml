name: Advance blocked issues

# When any issue in this repo is closed, re-evaluate all Todo project items.
# Items whose every blocker is now closed are advanced to Ready automatically.
#
# Requires a repository secret named PROJECT_TOKEN: a classic PAT with
# scopes: repo, project  (Settings → Secrets → Actions → New repository secret)

on:
  issues:
    types: [closed]

jobs:
  advance:
    runs-on: ubuntu-latest
    permissions:
      issues: read
    env:
      GH_TOKEN:        ${{ secrets.PROJECT_TOKEN }}
      PROJECT_OWNER:   AndresI19
      PROJECT_NUMBER:  "5"
    steps:
      - uses: actions/checkout@v4

      - name: Advance Todo → Ready for unblocked items
        run: python3 .github/scripts/advance_statuses.py
