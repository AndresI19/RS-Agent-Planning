name: lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate internal markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --offline '**/*.md'
          fail: true
